<!DOCTYPE html>

<html lang="fr">
<head>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Barlow:wght@300;400;500&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>

  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>

  <style>
    :root {
      /* Thème Lumineux et Contrasté */
      --sidebar-bg: #8dafd8;       /* Bleu nuit structuré pour le menu latéral */
      --sidebar-border: #042247;
      --sidebar-accent: #4283d3;
      
      --bg: #fffdef;               /* Fond de page gris-bleu très clair */
      --surface: #ffffff;          /* Cartes blanches */
      --border: #cbd5e1;           /* Bordures bien visibles */
      
      --text-main: #0f172a;        /* Texte principal Ardoise foncé (haute lisibilité) */
      --text-muted: #475569;       /* Texte secondaire */
      
      --danger: #dc2626;
      --radius: 8px;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Barlow', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      min-height: 100vh;
    }

    /* ═══ SIDEBAR ═══ */
    .sidebar {
      width: 270px;
      background: var(--sidebar-bg);
      padding: 32px 20px;
      display: flex;
      flex-direction: column;
      position: fixed;
      height: 100vh;
      z-index: 100;
      border-right: 1px solid var(--sidebar-border);
    }

    .logo-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-bottom: 36px;
      padding-bottom: 28px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    .logo-area img {
      width: 90px;
      height: 90px;
      object-fit: contain;
      border-radius: 50%;
      border: 2px solid rgba(217,154,28,0.35);
      background: rgba(255,255,255,0.05);
    }
    .logo-name {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #ffffff;
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .logo-name span { color: var(--sidebar-accent); }

    .btn-create {
      background: var(--sidebar-accent);
      color: #0e1a3a;
      padding: 13px 16px;
      border: none;
      border-radius: var(--radius-lg);
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 20px rgba(28, 126, 217, 0.35);
      width: 100%;
    }
    .btn-create:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(28, 110, 217, 0.5);
      background: #e6b53c;
    }

    .sidebar-footer {
      margin-top: auto;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--sidebar-muted);
      opacity: 0.7;
    }

    /* ═══ MAIN ═══ */
    .main-content {
      flex: 1;
      margin-left: 270px;
      padding: 48px 52px;
    }

    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
    }
    .page-title {
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      font-size: 1.9rem;
      letter-spacing: 0.03em;
      color: var(--text);
    }
    .clock {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--accent);
      background: #b0caf5;
      border: 1px solid #1D4ED8;
      padding: 6px 16px;
      border-radius: 20px;
    }

    /* ═══ GRID ═══ */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(330px, 1fr));
      gap: 24px;
    }

    /* ═══ CARD ═══ */
    .card {
      background: var(--surface);
      border-radius: var(--radius-xl);
      padding: 26px;
      border: 1px solid var(--border);
      box-shadow: 0 2px 8px rgba(0,0,0,0.03);
      transition: all 0.25s ease;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--sidebar-accent), transparent);
      opacity: 0;
      transition: opacity 0.25s;
    }
    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 16px 40px rgba(74,44,64,0.1);
      border-color: #f5e0cf;
    }
    .card:hover::before { opacity: 1; }

    .type-tag {
      display: inline-block;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 6px;
      background: #fdf1e8;
      color: var(--accent);
      border: 1px solid #f3dcc4;
      margin-bottom: 14px;
      width: fit-content;
    }

    .card-title {
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      font-size: 1.35rem;
      letter-spacing: 0.03em;
      color: var(--text);
      margin-bottom: 5px;
      text-transform: uppercase;
    }
    .card-code {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      color: var(--text-dim);
      margin-bottom: 22px;
    }

    .stat-pill {
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 12px 16px;
      border-radius: var(--radius-lg);
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .stat-label {
      font-size: 0.85rem;
      color: var(--text-muted);
      font-weight: 500;
    }
    .stat-val {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent);
    }

    /* ═══ ACTION BUTTONS ═══ */
    /* .actions-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    /* ═══ ACTION BUTTONS ═══ */
    .actions-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-top: 15px;
    }

    .btn-act {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 12px;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 600;
      text-decoration: none;
      text-align: center;
      transition: all 0.2s ease;
      border: 1px solid transparent;
      cursor: pointer;
    }

    /* Application de fonds opaques obligatoires (actifs au repos ET au survol) */
    .btn-saisie {
      background-color: #3b82f6 !important;
      color: #ffffff !important;
    }
    .btn-saisie:hover {
      background-color: #1d4ed8 !important;
      color: #ffffff !important;
      box-shadow: 0 4px 6px -1px rgba(29, 78, 216, 0.2);
    }

    .btn-qr {
      background-color: #0f172a !important;
      color: #ffffff !important;
    }
    .btn-qr:hover {
      background-color: #334155 !important;
      color: #ffffff !important;
      box-shadow: 0 4px 6px -1px rgba(15, 23, 42, 0.2);
    }

    .btn-tv {
      background-color: #10b981 !important;
      color: #ffffff !important;
    }
    .btn-tv:hover {
      background-color: #047857 !important;
      color: #ffffff !important;
      box-shadow: 0 4px 6px -1px rgba(4, 120, 87, 0.2);
    }

    .btn-del {
      background-color: #ef4444 !important;
      color: #ffffff !important;
    }
    .btn-del:hover {
      background-color: #b91c1c !important;
      color: #ffffff !important;
      box-shadow: 0 4px 6px -1px rgba(185, 28, 28, 0.2);
    }

    /* ═══ MODALS ═══ */
    .modal {
      position: fixed; inset: 0;
      background: rgba(42,22,40,0.45);
      backdrop-filter: blur(6px);
      display: none; align-items: center; justify-content: center;
      z-index: 1000;
    }
    .modal.active { display: flex; }

    .modal-content {
      background: white;
      padding: 36px;
      border-radius: var(--radius-xl);
      width: 90%;
      max-width: 440px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.15);
    }
    .modal-title {
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      font-size: 1.4rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--text);
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }
    .modal-content input,
    .modal-content select {
      width: 100%;
      padding: 12px 14px;
      margin-bottom: 14px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      font-family: 'Barlow', sans-serif;
      font-size: 0.95rem;
      color: var(--text);
      background: var(--surface2);
      outline: none;
      transition: border-color 0.2s;
    }
    .modal-content input:focus,
    .modal-content select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(190,24,93,0.08);
    }
    .modal-actions { display: flex; gap: 10px; margin-top: 6px; }
    .btn-modal-cancel {
      flex: 1; padding: 12px; border-radius: var(--radius);
      border: 1px solid var(--border); background: var(--surface2);
      font-family: 'Rajdhani', sans-serif; font-weight: 700;
      font-size: 0.95rem; text-transform: uppercase; letter-spacing: 0.05em;
      cursor: pointer; color: var(--text-muted); transition: all 0.18s;
    }
    .btn-modal-cancel:hover { background: var(--border); }
    .btn-modal-confirm {
      flex: 1; padding: 12px; border-radius: var(--radius);
      border: none; background: var(--sidebar-bg);
      font-family: 'Rajdhani', sans-serif; font-weight: 700;
      font-size: 0.95rem; text-transform: uppercase; letter-spacing: 0.05em;
      cursor: pointer; color: white; transition: all 0.18s;
    }
    .btn-modal-confirm:hover { background: #54141c; }

    /* QR modal */
    .qr-url {
      font-size: 0.72rem;
      color: var(--text-muted);
      word-break: break-all;
      margin: 14px 0;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 12px;
    }

    /* EMPTY STATE */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 24px;
      color: var(--text-dim);
    }
    .empty-state .icon { font-size: 3rem; margin-bottom: 16px; opacity: 0.4; }
    .empty-state p { font-size: 1rem; }
  </style>
</head>
<body>

  <style>
    #loginOverlay {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(160deg, #3a0e14 0%, #6a2418 100%);
      font-family: 'Rajdhani', sans-serif;
    }
    .login-card {
      background: #fff; border-radius: 18px; padding: 36px 32px;
      width: 320px; max-width: 90vw; text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.45); border-top: 5px solid #d99a1c;
    }
    .login-logo { width: 80px; height: 80px; object-fit: contain; border-radius: 50%; margin-bottom: 12px; }
    .login-title { margin: 0 0 4px; color: #3a0e14; font-size: 1.4rem; text-transform: uppercase; letter-spacing: .05em; }
    .login-sub { margin: 0 0 22px; color: #9a7264; font-size: .9rem; }
    .login-card input {
      width: 100%; box-sizing: border-box; padding: 12px 14px; margin-bottom: 12px;
      border: 1.5px solid #ead9cf; border-radius: 10px; font-size: 1rem; background: #fdf9f4; color: #3a0e14;
    }
    .login-card input:focus { outline: none; border-color: #c1271d; box-shadow: 0 0 0 3px rgba(193,39,29,0.15); }
    #loginBtn {
      width: 100%; padding: 13px; border: none; border-radius: 10px; cursor: pointer;
      background: #c1271d; color: #fff; font-weight: 700; font-size: 1rem; text-transform: uppercase; letter-spacing: .05em;
      transition: background .2s; font-family: 'Rajdhani', sans-serif;
    }
    #loginBtn:hover { background: #a31710; }
    .login-error { color: #c1271d; font-size: .85rem; margin-top: 12px; min-height: 1em; font-weight: 600; }
    .btn-logout {
      background: transparent; color: rgba(255,255,255,0.9); border: 1px solid rgba(255,255,255,0.4);
      border-radius: 10px; padding: 9px; cursor: pointer; width: 100%;
      font-family: 'Rajdhani', sans-serif; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; font-size: .8rem;
      transition: background .2s;
    }
    .btn-logout:hover { background: rgba(0,0,0,0.25); }
  </style>

  <div id="loginOverlay">
    <div class="login-card">
      <img src="logo.png" onerror="this.style.display='none'" class="login-logo" alt="">
      <h2 class="login-title" id="loginClub">Administration</h2>
      <p class="login-sub">Accès réservé</p>
      <input type="email" id="loginEmail" placeholder="Email" autocomplete="username">
      <input type="password" id="loginPwd" placeholder="Mot de passe" autocomplete="current-password">
      <button id="loginBtn" onclick="doLogin()">Se connecter</button>
      <div id="loginError" class="login-error"></div>
    </div>
  </div>

  <aside class="sidebar">
    <div class="logo-area">
      <img src="logo.png" id="clubLogo"
           onerror="this.style.display='none'" alt="Logo du club">
      <div class="logo-name"><span id="clubNameDisplay" style="color: #ffffff;"></span></div>
    </div>
    <button class="btn-create" onclick="openCreateModal()" style="background-color: #ffffff; color: var(--primary, #333); font-weight: bold;">+ Nouvelle Compétition</button>
    <button class="btn-logout" onclick="doLogout()" style="margin-top:auto;">⎋ Déconnexion</button>
    <div class="sidebar-footer">LIGUE CENTRE-VAL DE LOIRE · v1.5 — 13/07/2026</div>
  </aside>

  <main class="main-content">
    <div class="header-row">
      <div class="page-title">Tableau de bord</div>
      <div class="clock" id="clock">00:00:00</div>
    </div>
    <div class="grid" id="compGrid"></div>
  </main>

  <!-- MODAL CRÉATION -->
  <div class="modal" id="createModal">
    <div class="modal-content">
      <div class="modal-title">⚙️ Nouvelle Compétition</div>
      <input type="text" id="newCompName" placeholder="Nom de la Compétition">
      <input type="text" id="newCompCode" placeholder="Code (ex: TAR_2026)">
      <select id="newCompType">
        <option value="ISSF10">ISSF 10 Mètres</option>
        <option value="EDT">École de Tir (EDT)</option>
        <option value="MLAIC">Armes Anciennes (MLAIC)</option>
        <option value="TAR">TAR (Armes Réglementaires)</option>
        <option value="2550">ISSF 25/50 Mètres</option>
        <option value="AMICAL">Challenge Jeunes</option>
      </select>
      <div class="modal-actions">
        <button class="btn-modal-cancel" onclick="closeCreateModal()">Annuler</button>
        <button class="btn-modal-confirm" onclick="createComp()">Créer</button>
      </div>
    </div>
  </div>

  <!-- MODAL QR -->
  <div class="modal" id="qrModal">
    <div class="modal-content" style="text-align:center">
      <div class="modal-title" id="qrTitle">Accès Live</div>
      <div id="qrcode" style="display:inline-block; border: 6px solid #fdf1e8; border-radius: 12px;"></div>
      <div class="qr-url" id="qrUrl"></div>
      <button class="btn-modal-cancel" style="width:100%;" onclick="closeQrModal()">Fermer</button>
    </div>
  </div>

  <script>
    // ╔══════════════════════════════════════════════════════════════╗
    // ║  CONFIGURATION DU CLUB                                         ║
    // ║  >>> C'EST LE SEUL BLOC À MODIFIER POUR CHAQUE NOUVEAU CLUB <<<║
    // ╚══════════════════════════════════════════════════════════════╝
    const CONFIG = {

      // 1) Nom du club (s'affiche dans le titre et la barre latérale)
      clubName: "LIGUE CENTRE-VAL DE LOIRE",

      // 1bis) Identifiant technique du club = son dossier dans Firebase.
      //       SANS espaces ni accents. Doit être différent pour chaque club.
      clubKey: "LIGUE_CENTRE_VDL",

      // 2) Adresse du site sur GitHub Pages — sert à générer les QR codes.
      githubBase: "https://toma-it.github.io/resultats-tir-centre",

      // 3) Configuration Firebase
      firebase: {
        apiKey: "AIzaSyCCxEQPz9ACahpK4qC2-D67IKBEv6mcKHE",
        authDomain: "resultats-tir-centre.firebaseapp.com",
        databaseURL: "https://resultats-tir-centre-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "resultats-tir-centre",
        storageBucket: "resultats-tir-centre.firebasestorage.app",
        appId: "1:247507218569:web:ea3bdc169dde0f29709658"
      }
    };
    // ─── Fin de la configuration — ne rien modifier en dessous ───────

    firebase.initializeApp(CONFIG.firebase);
    const database = firebase.database();
    const CLUB_PATH = 'clubs/' + CONFIG.clubKey;   // dossier propre au club
    const GITHUB_BASE = CONFIG.githubBase.replace(/\/+$/, '');

    // Applique le nom du club au titre et à la barre latérale
    document.title = "🎯 " + CONFIG.clubName + " — Admin";
    document.getElementById('clubNameDisplay').textContent = CONFIG.clubName;
    document.getElementById('clubLogo').alt = "Logo " + CONFIG.clubName;

    // ─── Authentification (protection de l'admin) ───
    const auth = firebase.auth();
    document.getElementById('loginClub').textContent = CONFIG.clubName + " · Admin";

    auth.onAuthStateChanged(user => {
      document.getElementById('loginOverlay').style.display = user ? 'none' : 'flex';
    });

    function doLogin() {
      const email = document.getElementById('loginEmail').value.trim();
      const pwd = document.getElementById('loginPwd').value;
      const err = document.getElementById('loginError');
      err.textContent = 'Connexion...';
      auth.signInWithEmailAndPassword(email, pwd)
        .catch(e => {
          const map = {
            'auth/invalid-email': "Adresse email mal formée.",
            'auth/user-not-found': "Aucun compte avec cet email.",
            'auth/wrong-password': "Mot de passe incorrect.",
            'auth/invalid-credential': "Email ou mot de passe incorrect.",
            'auth/missing-password': "Mot de passe manquant.",
            'auth/operation-not-allowed': "Connexion email/mot de passe non activée dans Firebase.",
            'auth/too-many-requests': "Trop de tentatives, réessaie dans quelques minutes.",
            'auth/network-request-failed': "Problème de réseau.",
            'auth/unauthorized-domain': "Domaine non autorisé (Authentication → Settings → Authorized domains)."
          };
          err.textContent = (map[e.code] || "Échec de connexion.") + "  [" + e.code + "]";
        });
    }
    function doLogout() { auth.signOut(); }

    document.getElementById('loginPwd').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

    function openCreateModal() { document.getElementById('createModal').classList.add('active'); }
    function closeCreateModal() { document.getElementById('createModal').classList.remove('active'); }

    function createComp() {
      const name = document.getElementById('newCompName').value.trim();
      const code = document.getElementById('newCompCode').value.trim().toUpperCase().replace(/\s/g, '_');
      const type = document.getElementById('newCompType').value;
      if (!name || !code) return alert("Remplis tout !");
      if (/[.#$\[\]\/]/.test(code)) return alert("Le code ne doit pas contenir : . # $ [ ] /");
      database.ref(CLUB_PATH + '/' + code + '/config').set({ name, type }).then(() => {
        closeCreateModal();
        document.getElementById('newCompName').value = '';
        document.getElementById('newCompCode').value = '';
      });
    }

    function deleteComp(code, name) {
      if (confirm(`Supprimer définitivement "${name}" ?`)) database.ref(CLUB_PATH + '/' + code).remove();
    }

    function openQr(code) {
      const url = `${GITHUB_BASE}/affichage_multicomp.html?comp=${code}`;
      document.getElementById('qrTitle').textContent = '📱 ' + code;
      document.getElementById('qrUrl').textContent = url;
      const qrContainer = document.getElementById('qrcode');
      qrContainer.innerHTML = '';
      new QRCode(qrContainer, { text: url, width: 200, height: 200 });
      document.getElementById('qrModal').classList.add('active');
    }

    function closeQrModal() { document.getElementById('qrModal').classList.remove('active'); }

    database.ref(CLUB_PATH).on('value', snap => {
      const grid = document.getElementById('compGrid');
      grid.innerHTML = '';
      const data = snap.val();
      if (!data) {
        grid.innerHTML = `<div class="empty-state"><div class="icon">🎯</div><p>Aucune compétition créée pour l'instant.</p></div>`;
        return;
      }

      let hasCards = false;
      Object.keys(data).sort().forEach(code => {
        const config = data[code].config;
        if (config && config.name) {
          hasCards = true;
          const shooterCount = data[code].shooters ? Object.keys(data[code].shooters).length : 0;
          const card = document.createElement('div');
          card.className = 'card';
          card.innerHTML = `
            <div class="type-tag">${config.type || 'MULTI'}</div>
            <div class="card-title">${config.name}</div>
            <div class="card-code">#${code}</div>
            <div class="stat-pill">
              <span class="stat-label">Tireurs inscrits</span>
              <span class="stat-val">${shooterCount}</span>
            </div>
            <div class="actions-grid">
              <a href="saisie_multicomp.html?comp=${code}" class="btn-act btn-saisie">⌨️ Saisie</a>
              <button onclick="openQr('${code}')" class="btn-act btn-qr">📱 QR Code</button>
              <a href="affichage_multicomp.html?comp=${code}" target="_blank" class="btn-act btn-tv">📺 Affichage Live</a>
              <button onclick="deleteComp('${code}', '${config.name.replace(/'/g,"\\'")}')" class="btn-act btn-del">🗑️ Supprimer</button>
            </div>
          `;
          grid.appendChild(card);
        }
      });

      if (!hasCards) {
        grid.innerHTML = `<div class="empty-state"><div class="icon">🎯</div><p>Aucune compétition créée pour l'instant.</p></div>`;
      }
    });

    setInterval(() => {
      document.getElementById('clock').textContent = new Date().toLocaleTimeString('fr-FR');
    }, 1000);
  </script>
</body>
</html>
